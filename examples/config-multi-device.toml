# Oh-Ben-Claw — Multi-Device Configuration Example
#
# This example shows how to configure a fleet of peripheral nodes:
# - A Waveshare ESP32-S3 Touch LCD 2.1 connected via USB serial
# - A NanoPi Neo3 running natively
# - A Raspberry Pi connected via MQTT (wireless)
#
# Copy to ~/.oh-ben-claw/config.toml and adjust as needed.

[agent]
name = "Oh-Ben-Claw"
system_prompt = """
You are Oh-Ben-Claw, an advanced multi-device AI assistant.
You can see, hear, sense, and act in the physical world through
a fleet of connected hardware devices. Be helpful, precise, and proactive.
When asked to interact with hardware, always confirm the action before executing it.
"""
max_tool_iterations = 15

[provider]
name = "openai"
model = "gpt-4o"
# api_key = "sk-..."  # Or set OPENAI_API_KEY environment variable

# ── Model Failover (Phase 10 — OpenClaw Parity) ──────────────────────────────
# Define fallback providers tried in order when the primary provider fails.
# [[provider.fallbacks]]
# name    = "anthropic"
# model   = "claude-3-5-sonnet-20241022"
# api_key = "sk-ant-..."
#
# [[provider.fallbacks]]
# name  = "ollama"
# model = "llama3.2"

# ── Retry Policy (Phase 10 — OpenClaw Parity) ────────────────────────────────
# Automatically retry transient errors (rate-limits, network blips).
# [provider.retry]
# max_retries         = 3
# initial_backoff_ms  = 500
# max_backoff_ms      = 10000
# backoff_multiplier  = 2.0

[spine]
kind = "mqtt"
host = "localhost"
port = 1883
# username = "oh-ben-claw"
# password = "your-mqtt-password"
# tls = true
tool_timeout_secs = 30

[peripherals]
enabled = true
datasheet_dir = "docs/datasheets"

# Waveshare ESP32-S3 Touch LCD 2.1 — connected via USB serial
# Provides: camera_capture, audio_sample, sensor_read, gpio_read, gpio_write
[[peripherals.boards]]
board = "waveshare-esp32-s3-touch-lcd-2.1"
transport = "serial"
path = "/dev/ttyUSB0"   # Linux: /dev/ttyUSB0 or /dev/ttyACM0; macOS: /dev/cu.usbmodem*
baud = 115200

# NanoPi Neo3 — running natively on the same Linux host
# Provides: gpio_read, gpio_write
# Build with: cargo build --features hardware,peripheral-nanopi
[[peripherals.boards]]
board = "nanopi-neo3"
transport = "native"

# Raspberry Pi — connected wirelessly via MQTT
# The RPi runs its own Oh-Ben-Claw agent and announces itself on the spine
# Provides: gpio_read, gpio_write, camera_capture, audio_sample
[[peripherals.boards]]
board = "rpi-gpio"
transport = "mqtt"
node_id = "rpi-living-room"

[channels.telegram]
# token = "your-telegram-bot-token"

[channels.discord]
# token = "your-discord-bot-token"

# ── IRC (Phase 10 — OpenClaw Parity) ─────────────────────────────────────────
[channels.irc]
# Connect to an IRC server and join channels.
# host     = "irc.libera.chat"
# port     = 6697
# use_tls  = true
# nickname = "oh-ben-claw"
# channels = ["#ai-bots", "#myserver"]
# Optional SASL authentication:
# sasl_username = "oh-ben-claw"
# sasl_password = "your-nickserv-password"

# ── Signal (Phase 10 — OpenClaw Parity) ──────────────────────────────────────
[channels.signal]
# Requires signal-cli running in daemon mode:
#   signal-cli -a +1234567890 daemon --http localhost:8080
# cli_url      = "http://localhost:8080"
# phone_number = "+1234567890"
# Optional allowlist (empty = accept all):
# allowed_numbers = ["+10987654321"]

# ── Mattermost (Phase 10 — OpenClaw Parity) ──────────────────────────────────
[channels.mattermost]
# server_url = "https://mattermost.example.com"
# token      = "your-personal-access-token"

# ── Typing indicators (Phase 10 — OpenClaw Parity) ───────────────────────────
# Send "typing…" status to Telegram, Discord, and Slack while the agent
# processes a message.  Enabled by default.
# typing_indicators = true

# ── Security Configuration ───────────────────────────────────────────────────

[security]
# Require peripheral nodes to present a valid HMAC-SHA256 pairing token
# before their tools are registered into the agent's tool registry.
# Generate a secret with: openssl rand -hex 32
require_pairing = false
# pairing_secret = "your-32-byte-hex-secret-here"

# Enable the encrypted secrets vault for API keys and credentials.
# Secrets stored in the vault take precedence over environment variables.
vault_enabled = false
# vault_path = "~/.oh-ben-claw/vault.db"

# Tool execution policies — evaluated in order, first match wins.
# Actions: "allow" (default), "deny" (block), "audit" (allow + log warning)

# Example: Audit all shell commands
# [[security.policies]]
# name = "audit-shell"
# tool_pattern = "shell"
# action = "audit"
# reason = "All shell commands are logged for review"

# Example: Block writes to sensitive system paths
# [[security.policies]]
# name = "deny-etc-writes"
# tool_pattern = "file_write"
# arg_contains = "/etc/"
# action = "deny"
# reason = "Writing to /etc is not permitted"

# Example: Deny all tools except the built-ins (whitelist approach)
# [[security.policies]]
# name = "deny-unknown-peripherals"
# tool_pattern = "*"
# action = "deny"
# reason = "Only explicitly allowed tools are permitted"

# ── Gateway Configuration ─────────────────────────────────────────────────────

[gateway]
# Enable the REST/WebSocket API gateway.
# Once enabled, Oh-Ben-Claw is accessible from any browser or mobile device.
enabled = false

# Bind to 0.0.0.0 to allow connections from other devices on your network.
# Use 127.0.0.1 (default) for local-only access.
host = "127.0.0.1"
port = 8080

# Optional Bearer token for API authentication.
# If set, all API requests must include: Authorization: Bearer <token>
# Generate with: openssl rand -hex 32
# api_token = "your-secret-token-here"

# Serve the built-in PWA web client at http://<host>:<port>/
serve_pwa = true

# CORS allowed origins (leave empty to allow all origins)
# cors_origins = ["https://yourdomain.com"]

# ── Tunnel Configuration ─────────────────────────────────────────────────────

[tunnel]
# Enable the network tunnel for public internet access.
# Requires the gateway to be enabled first.
enabled = false

# Tunnel backend: "cloudflare" or "tailscale"
backend = "cloudflare"

# The local port the gateway is listening on (must match [gateway].port).
local_port = 8080

# ── Cloudflare Quick Tunnel (no account required, temporary URL) ──
# No additional config needed. Just set enabled = true and run:
#   oh-ben-claw start --gateway --tunnel

# ── Cloudflare Named Tunnel (persistent custom domain) ──
# 1. Run: cloudflared tunnel login
# 2. Run: cloudflared tunnel create oh-ben-claw
# 3. Run: cloudflared tunnel route dns oh-ben-claw obc.yourdomain.com
# 4. Get the token: cloudflared tunnel token oh-ben-claw
# named_tunnel = "oh-ben-claw"
# token = "eyJhIjoiM..."

# ── Tailscale (private Tailnet access) ──
# 1. Install Tailscale: curl -fsSL https://tailscale.com/install.sh | sh
# 2. Run: sudo tailscale up
# 3. Set backend = "tailscale"
# tailscale_funnel = false   # Set to true for public HTTPS access via Tailscale Funnel
