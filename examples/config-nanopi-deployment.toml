# Oh-Ben-Claw — NanoPi Neo3 Reference Deployment Configuration
#
# This configuration is for the Phase 13 reference hardware scenario:
#
#   Host   : NanoPi-Neo3 (RK3328 quad-core ARM Cortex-A53, 1 GB RAM, Armbian)
#   Display: Waveshare ESP32-S3-Touch-LCD-2.1 (2.1" round touch LCD + speaker)
#   Vision : Seeed XIAO ESP32S3-Sense (OV2640 camera + PDM microphone)
#   Hearing: Sipeed 6+1 Mic Array (far-field 6+1 MEMS mic array, USB audio)
#   Sensing: DHT22 temperature & humidity sensor (GPIO, on NanoPi GPIO header)
#
# Generated by: DeploymentPlanner (Oh-Ben-Claw Phase 13)
# Copy to ~/.oh-ben-claw/config.toml and adjust as needed.

# ── Agent ─────────────────────────────────────────────────────────────────────

[agent]
name = "Oh-Ben-Claw"
system_prompt = """
You are Oh-Ben-Claw, an advanced multi-device AI assistant deployed on a
NanoPi Neo3 home hub. You can see through the XIAO ESP32S3-Sense camera,
hear through the Sipeed 7-microphone array, speak and display information
through the Waveshare 2.1-inch round touch display, and sense the environment
through the DHT22 temperature/humidity sensor.

Coordinate your specialised sub-agents to fulfil user requests efficiently.
Always acknowledge which sensor or peripheral you are using when reporting
information. Prefer on-device processing when possible.
"""
max_tool_iterations = 15

# ── LLM Provider ─────────────────────────────────────────────────────────────

[provider]
name    = "openai"
model   = "gpt-4o"
# api_key = "sk-..."  # Or set OPENAI_API_KEY

# Fallback to local Ollama when the cloud is unreachable
[[provider.fallbacks]]
name  = "ollama"
model = "llama3.2"

[provider.retry]
max_retries        = 3
initial_backoff_ms = 500

# ── Spine (MQTT mesh) ─────────────────────────────────────────────────────────

[spine]
kind              = "mqtt"
host              = "localhost"    # Mosquitto running on the NanoPi
port              = 1883
tool_timeout_secs = 30

# ── Edge-Native Mode ──────────────────────────────────────────────────────────
# Enables the lightweight on-device agent loop on the NanoPi Neo3.

[edge]
enabled               = true
max_history_messages  = 20
max_tool_iterations   = 5
p2p_enabled           = true   # Join the P2P mesh for sub-agent discovery

# ── Peripherals ───────────────────────────────────────────────────────────────

[peripherals]
enabled       = true
datasheet_dir = "docs/datasheets"

# NanoPi Neo3 — native host, GPIO header with DHT22 on pin 7
[[peripherals.boards]]
board     = "nanopi-neo3"
transport = "native"
# accessories: dht22 on GPIO pin 7

# Waveshare ESP32-S3-Touch-LCD-2.1 — display/sound interface
# Adjust path to the actual /dev/tty* device that appears when plugged in.
[[peripherals.boards]]
board     = "waveshare-esp32-s3-touch-lcd-2.1"
transport = "serial"
path      = "/dev/ttyUSB0"
baud      = 115200

# Seeed XIAO ESP32S3-Sense — vision node (camera + microphone)
[[peripherals.boards]]
board     = "xiao-esp32s3-sense"
transport = "serial"
path      = "/dev/ttyUSB1"
baud      = 115200

# Sipeed 6+1 Mic Array — far-field listening
# The mic array enumerates as a USB audio device (UAC1).
# On Linux it appears as /dev/snd/pcmC*D*c (ALSA).  The serial port below
# is for the STM32 command interface; audio is captured via ALSA directly.
[[peripherals.boards]]
board     = "sipeed-6plus1-mic-array"
transport = "serial"
path      = "/dev/ttyACM0"
baud      = 115200

# ── Orchestrator & Sub-Agent Swarm ────────────────────────────────────────────
# Pre-spawn the specialised sub-agents for each hardware role.

[orchestrator]
enabled  = true
routing  = "manual"

# Vision agent — drives the XIAO ESP32S3-Sense camera
[[orchestrator.agents]]
name   = "vision-agent"
role   = "Vision specialist. Captures images from the XIAO ESP32S3-Sense camera, \
          analyses visual context, detects objects and scenes, and returns findings."
tools  = ["camera_capture", "sensor_read", "memory_note"]

# Audio agent — drives the Sipeed mic array for speech-to-text
[[orchestrator.agents]]
name   = "audio-agent"
role   = "Audio specialist. Captures audio from the Sipeed 6+1 mic array, \
          performs speech-to-text transcription, and forwards text to the orchestrator."
tools  = ["audio_sample", "sensor_read"]

# Speech/display agent — drives the Waveshare touch display
[[orchestrator.agents]]
name   = "speech-display-agent"
role   = "Display and speech output specialist. Renders status, messages, and \
          responses on the 2.1-inch round touch display. Plays TTS audio through \
          the integrated speaker. Accepts touch input for UI interactions."
tools  = ["sensor_read", "gpio_write"]

# Sensing agent — reads DHT22 on the NanoPi GPIO header
[[orchestrator.agents]]
name   = "sensing-agent"
role   = "Environmental sensing specialist. Reads temperature and humidity from \
          the DHT22 sensor on the NanoPi Neo3 GPIO header. Logs readings and \
          triggers alerts when configured thresholds are exceeded."
tools  = ["sensor_read", "gpio_read", "i2c_read", "memory_note"]

# ── Deployment Scheme Generator ───────────────────────────────────────────────
# Records the hardware inventory for the deployment planner.
# Set auto_plan = true to regenerate the scheme at every startup.

[deployment]
enabled         = true
scenario        = "NanoPi-Neo3 Reference Deployment"
auto_plan       = false   # true = print scheme on startup
auto_spawn      = false   # true = pre-spawn agents from planner output
llm_swarm       = false   # true = use LLM sub-agents to refine the plan

feature_desires = [
    "vision",
    "listening",
    "speech",
    "environmental_sensing",
    "display_output",
    "touch_input",
    "wireless_mesh",
    "persistent_memory",
]

[[deployment.hardware]]
name        = "nanopi-neo3"
board_name  = "nanopi-neo3"
transport   = "native"
role        = "host"
accessories = ["dht22"]

[[deployment.hardware]]
name       = "waveshare-esp32-s3-touch-lcd-2.1"
board_name = "waveshare-esp32-s3-touch-lcd-2.1"
transport  = "serial"
path       = "/dev/ttyUSB0"
role       = "display"

[[deployment.hardware]]
name       = "xiao-esp32s3-sense"
board_name = "xiao-esp32s3-sense"
transport  = "serial"
path       = "/dev/ttyUSB1"
role       = "vision"

[[deployment.hardware]]
name       = "sipeed-6plus1-mic-array"
board_name = "sipeed-6plus1-mic-array"
transport  = "serial"
path       = "/dev/ttyACM0"
role       = "listening"

# ── Security ──────────────────────────────────────────────────────────────────

[security]
require_pairing = false
# pairing_secret = "change-me-strong-secret-min-16-chars"

# ── Gateway (optional REST/WebSocket API) ─────────────────────────────────────

[gateway]
enabled    = false
host       = "0.0.0.0"
port       = 8080
# api_token = "your-api-token"

# ── Autonomy ──────────────────────────────────────────────────────────────────

[autonomy]
level        = "supervised"
auto_approve = ["sensor_read", "camera_capture", "audio_sample", "gpio_read"]
always_ask   = ["gpio_write", "shell"]

# ── Cost Tracking ─────────────────────────────────────────────────────────────

[cost]
enabled           = true
daily_limit_usd   = 2.00
monthly_limit_usd = 30.00
warn_threshold    = 0.80
