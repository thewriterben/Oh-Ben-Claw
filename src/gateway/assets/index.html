<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Oh-Ben-Claw</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --user-bubble: #312e81;
      --assistant-bubble: #1e293b;
      --tool-bg: #0f172a;
      --radius: 12px;
      --radius-sm: 6px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
    header h1 span { color: var(--accent); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--error); transition: background 0.3s; }
    .status-dot.connected { background: var(--success); }

    /* ── Tab bar ── */
    .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab { flex: 1; padding: 10px; text-align: center; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover { color: var(--text); }

    /* ── Panels ── */
    .panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .panel.active { display: flex; }

    /* ── Chat panel ── */
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
    .message { display: flex; flex-direction: column; max-width: 85%; }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }
    .bubble { padding: 10px 14px; border-radius: var(--radius); line-height: 1.5; font-size: 0.9rem; white-space: pre-wrap; word-break: break-word; }
    .message.user .bubble { background: var(--user-bubble); border-bottom-right-radius: 3px; }
    .message.assistant .bubble { background: var(--assistant-bubble); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
    .message-meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 3px; padding: 0 4px; }
    .message.user .message-meta { text-align: right; }

    /* ── Tool call display ── */
    .tool-call { background: var(--tool-bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; font-family: var(--font-mono); font-size: 0.78rem; margin-top: 6px; }
    .tool-call-header { display: flex; align-items: center; gap: 6px; color: var(--warning); font-weight: 600; cursor: pointer; }
    .tool-call-header .icon { font-size: 0.9rem; }
    .tool-call-body { margin-top: 6px; color: var(--text-muted); display: none; }
    .tool-call-body.expanded { display: block; }
    .tool-result { color: var(--success); }
    .tool-result.error { color: var(--error); }

    /* ── Thinking indicator ── */
    .thinking { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 0.85rem; padding: 8px 0; }
    .dots { display: flex; gap: 4px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

    /* ── Input area ── */
    .input-area { padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
    #input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; color: var(--text); font-family: var(--font); font-size: 0.9rem; resize: none; min-height: 42px; max-height: 120px; outline: none; transition: border-color 0.15s; }
    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--text-muted); }
    #send-btn { background: var(--accent); color: white; border: none; border-radius: var(--radius); padding: 10px 16px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.15s; white-space: nowrap; height: 42px; }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Nodes panel ── */
    .nodes-list { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .node-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
    .node-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .node-name { font-weight: 600; font-size: 0.9rem; }
    .node-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
    .node-badge.online { background: rgba(34,197,94,0.15); color: var(--success); }
    .node-badge.offline { background: rgba(239,68,68,0.15); color: var(--error); }
    .node-tools { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .tool-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 0.72rem; font-family: var(--font-mono); color: var(--text-muted); }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); gap: 8px; }
    .empty-state .icon { font-size: 2.5rem; opacity: 0.4; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>Oh-Ben-<span>Claw</span></h1>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="status-text" style="font-size:0.75rem;color:var(--text-muted)">Connecting...</span>
      <div class="status-dot" id="status-dot"></div>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="chat">Chat</div>
    <div class="tab" data-tab="nodes">Devices</div>
    <div class="tab" data-tab="tools">Tool Log</div>
  </div>

  <!-- Chat Panel -->
  <div class="panel active" id="panel-chat">
    <div id="messages"></div>
    <div class="input-area">
      <textarea id="input" placeholder="Message Oh-Ben-Claw..." rows="1"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <!-- Nodes Panel -->
  <div class="panel" id="panel-nodes">
    <div class="nodes-list" id="nodes-list">
      <div class="empty-state">
        <div class="icon">📡</div>
        <div>No peripheral nodes connected</div>
        <div style="font-size:0.8rem">Nodes appear here when they connect via MQTT spine</div>
      </div>
    </div>
  </div>

  <!-- Tool Log Panel -->
  <div class="panel" id="panel-tools">
    <div id="tool-log" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;">
      <div class="empty-state">
        <div class="icon">🔧</div>
        <div>No tool calls yet</div>
      </div>
    </div>
  </div>
</div>

<script>
const WS_URL = `ws://${location.host}/ws`;
let ws = null;
let reconnectTimer = null;
let sessionId = 'default';
const nodes = new Map();
const toolLog = [];

// ── WebSocket ──────────────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setStatus(true);
    clearTimeout(reconnectTimer);
  };

  ws.onclose = () => {
    setStatus(false);
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => setStatus(false);

  ws.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      handleEvent(event);
    } catch {}
  };
}

function setStatus(connected) {
  document.getElementById('status-dot').classList.toggle('connected', connected);
  document.getElementById('status-text').textContent = connected ? 'Connected' : 'Reconnecting...';
}

function send(content) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'chat', content, session_id: sessionId }));
}

// ── Event Handlers ─────────────────────────────────────────────────────────
function handleEvent(event) {
  switch (event.type) {
    case 'message':
      removeThinking();
      appendMessage(event.role, event.content);
      break;
    case 'tool_call':
      appendToolCall(event);
      break;
    case 'tool_result':
      appendToolResult(event);
      break;
    case 'node_connected':
      nodes.set(event.node_id, { ...event, status: 'online' });
      renderNodes();
      break;
    case 'node_disconnected':
      if (nodes.has(event.node_id)) {
        nodes.get(event.node_id).status = 'offline';
        renderNodes();
      }
      break;
    case 'status':
      break;
  }
}

// ── Chat ───────────────────────────────────────────────────────────────────
function appendMessage(role, content) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = `
    <div class="bubble">${escapeHtml(content)}</div>
    <div class="message-meta">${time}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showThinking() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.id = 'thinking';
  div.className = 'thinking';
  div.innerHTML = `<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><span>Thinking...</span>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeThinking() {
  document.getElementById('thinking')?.remove();
}

function appendToolCall(event) {
  const log = document.getElementById('tool-log');
  const empty = log.querySelector('.empty-state');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'tool-call';
  div.id = `tc-${event.call_id}`;
  div.innerHTML = `
    <div class="tool-call-header" onclick="this.nextElementSibling.classList.toggle('expanded')">
      <span class="icon">⚙</span>
      <span>${escapeHtml(event.name)}</span>
      <span style="margin-left:auto;font-size:0.7rem;color:var(--text-muted)">${new Date().toLocaleTimeString()}</span>
    </div>
    <div class="tool-call-body">
      <div style="color:var(--text-muted);margin-bottom:4px">Args:</div>
      <pre style="white-space:pre-wrap;word-break:break-all">${escapeHtml(JSON.stringify(event.args, null, 2))}</pre>
    </div>
  `;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function appendToolResult(event) {
  const el = document.getElementById(`tc-${event.call_id}`);
  if (el) {
    const body = el.querySelector('.tool-call-body');
    const resultDiv = document.createElement('div');
    resultDiv.className = `tool-result${event.success ? '' : ' error'}`;
    resultDiv.style.marginTop = '6px';
    resultDiv.innerHTML = `<div style="margin-bottom:2px">${event.success ? '✓ Result:' : '✗ Error:'}</div><pre style="white-space:pre-wrap;word-break:break-all">${escapeHtml(event.result)}</pre>`;
    body.appendChild(resultDiv);
  }
}

// ── Nodes ──────────────────────────────────────────────────────────────────
function renderNodes() {
  const list = document.getElementById('nodes-list');
  if (nodes.size === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📡</div><div>No peripheral nodes connected</div></div>`;
    return;
  }
  list.innerHTML = '';
  for (const [id, node] of nodes) {
    const card = document.createElement('div');
    card.className = 'node-card';
    const tools = (node.tools || []).map(t => `<span class="tool-chip">${escapeHtml(t)}</span>`).join('');
    card.innerHTML = `
      <div class="node-header">
        <div class="node-name">${escapeHtml(id)}</div>
        <span class="node-badge ${node.status}">${node.status}</span>
      </div>
      <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:6px">${escapeHtml(node.board || '')}</div>
      <div class="node-tools">${tools}</div>
    `;
    list.appendChild(card);
  }
}

// ── Input ──────────────────────────────────────────────────────────────────
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');

function submitMessage() {
  const text = input.value.trim();
  if (!text) return;
  appendMessage('user', text);
  showThinking();
  send(text);
  input.value = '';
  input.style.height = 'auto';
}

sendBtn.addEventListener('click', submitMessage);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitMessage(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// ── Tabs ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
  });
});

// ── Utils ──────────────────────────────────────────────────────────────────
function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Service Worker ─────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ── Init ───────────────────────────────────────────────────────────────────
connect();
appendMessage('assistant', 'Hello! I am Oh-Ben-Claw. I have access to your connected devices and can help you control them, answer questions, and run tasks. How can I help?');
</script>
</body>
</html>
