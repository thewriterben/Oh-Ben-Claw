name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
jobs:
  # ── Build & Test (host) ────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build (default features)
        run: cargo build --workspace --exclude obc-esp32-s3
      - name: Build (all host features)
        run: cargo build --workspace --exclude obc-esp32-s3 --features hardware,mqtt-spine
      - name: Build (NanoPi feature, Linux only)
        run: cargo build --workspace --exclude obc-esp32-s3 --features hardware,peripheral-nanopi
      - name: Run tests
        run: cargo test --workspace --exclude obc-esp32-s3
      - name: Clippy
        run: cargo clippy --workspace --exclude obc-esp32-s3 -- -D warnings
      - name: Format check
        run: cargo fmt --all --check
  # ── MCP conformance (official suite vs. our hand-rolled implementation) ───
  # Runs the Model Context Protocol conformance suite against the OBC MCP
  # server in BOTH protocol modes. Advisory (continue-on-error) until an
  # --expected-failures baseline is captured from the first runs; then flip
  # to blocking.
  mcp-conformance:
    name: MCP Conformance (2025-11-25 + 2026-07-28 draft)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build OBC
        run: cargo build --bin oh-ben-claw
      - name: Conformance — legacy lifecycle (2025-11-25)
        run: |
          ./target/debug/oh-ben-claw mcp-serve --transport http --port 3411 --mode legacy-2024 &
          SERVER_PID=$!
          sleep 2
          npx --yes @modelcontextprotocol/conformance server \
            --url http://127.0.0.1:3411/mcp --spec-version 2025-11-25 || true
          kill $SERVER_PID
      - name: Conformance — stateless lifecycle (2026-07-28 draft)
        run: |
          ./target/debug/oh-ben-claw mcp-serve --transport http --port 3412 --mode stateless-2026 &
          SERVER_PID=$!
          sleep 2
          npx --yes @modelcontextprotocol/conformance server \
            --url http://127.0.0.1:3412/mcp --spec-version draft || true
          kill $SERVER_PID
  # ── Cross-compile for AArch64 (NanoPi Neo3) ───────────────────────────────
  cross-aarch64:
    name: Cross-compile AArch64 (NanoPi Neo3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Install cross-compilation tools
        run: sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-aarch64-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Cross-compile for AArch64
        run: |
          cargo build \
            --workspace \
            --target aarch64-unknown-linux-gnu \
            --features hardware,peripheral-nanopi \
            --exclude obc-esp32-s3
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
  # ── Security audit ─────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: cargo audit
  # ── GUI — TypeScript type-check ───────────────────────────────────────────
  gui-check:
    name: GUI TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: TypeScript type-check
        run: npx tsc --noEmit
